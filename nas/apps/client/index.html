<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Carvis Remote</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="phone-shell">
    <header class="wood-header">
      <div class="brand-card">Carvis</div>
      <div class="net-card">
        <span>远程控制</span>
        <strong id="publicUrl">检测中...</strong>
      </div>
    </header>

    <section class="panel input-panel">
      <h1>输入栏</h1>
      <div class="task-row">
        <textarea id="taskInput" rows="3" placeholder="请输入内容..."></textarea>
        <button id="submitButton" type="button" aria-label="开始协同">启动</button>
      </div>
      <p id="draftStatus" class="status-line">输入会实时浮现在 Electron 上。</p>
    </section>

    <section class="panel output-panel">
      <h2>Output</h2>
      <div id="outputBox" class="output-box">
        <p class="muted">等待输出结果...</p>
      </div>
    </section>

    <section class="panel history-panel">
      <h2>历史栏</h2>
      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <div id="fileDrawer" class="drawer" hidden>
    <div class="drawer-head">
      <strong id="drawerTitle">文件</strong>
      <button id="drawerClose" type="button">关闭</button>
    </div>
    <div id="fileList" class="file-list"></div>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
